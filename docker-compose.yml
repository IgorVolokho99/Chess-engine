name: MariaNet


services:
  db:
    image: mysql:9.7
    container_name: mysql-db
    init: true
    restart: unless-stopped
    stop_grace_period: 30s

    env_file: ".env"    

    secrets:


    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  
volumes:
  db_data:
networks:
  app-network:
    driver: bridge 

